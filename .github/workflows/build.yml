name: Build and Release PDF Watermark Remover
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pyarmor
        pip install -r requirements.txt
    
    - name: Get version from file
      id: get_version
      run: |
        if (Test-Path version.txt) {
          $version = Get-Content version.txt
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        } else {
          echo "VERSION=1.0" >> $env:GITHUB_OUTPUT
        }
    
    - name: Check if tag exists
      id: check_tag
      run: |
        $tagExists = git tag -l "v${{ steps.get_version.outputs.VERSION }}"
        if ("$tagExists" -eq "v${{ steps.get_version.outputs.VERSION }}") {
          echo "TAG_EXISTS=true" >> $env:GITHUB_OUTPUT
        } else {
          echo "TAG_EXISTS=false" >> $env:GITHUB_OUTPUT
        }

    - name: Obfuscate Code with PyArmor
      run: |
        # Verify entry points exist
        if (Test-Path run.py) { echo "Entry point run.py exists" }
        else { echo "Entry point run.py does not exist"; exit 1 }

        if (Test-Path main/remove_watermark.py) { echo "File main/remove_watermark.py exists" }
        else { echo "File main/remove_watermark.py does not exist"; exit 1 }

        # PyArmor 8+ uses 'gen' instead of the removed 'obfuscate' command
        pyarmor gen --recursive --output dist_obf run.py main/ mechanisms/ ui/

        # List obfuscated files to confirm
        Get-ChildItem -Path dist_obf -Recurse

    - name: Build with PyInstaller
      run: |
        # Build from the obfuscated output
        python -m PyInstaller --onefile --windowed --icon=assets/icons/icon_remove_watermark.ico `
          --add-data "version.txt;." `
          --add-data "assets/*;assets" `
          --hidden-import customtkinter `
          --hidden-import fitz `
          --hidden-import pymupdf `
          --hidden-import tempfile `
          --hidden-import shutil `
          --hidden-import threading `
          --hidden-import tkinter `
          --hidden-import tkinter.messagebox `
          --hidden-import tkinter.filedialog `
          --hidden-import main `
          --hidden-import main.remove_watermark `
          --hidden-import mechanisms `
          --hidden-import mechanisms.watermark_processor `
          --hidden-import ui `
          --hidden-import ui.app_ui `
          --hidden-import ui.app_styles `
          --hidden-import ui.dialog_windows `
          --paths dist_obf `
          --paths dist_obf/main `
          --paths dist_obf/mechanisms `
          --paths dist_obf/ui `
          dist_obf/run.py
        
        # Verify the executable was created
        if (Test-Path dist/run.exe) {
          $version = "${{ steps.get_version.outputs.VERSION }}"
          Rename-Item -Path "dist\run.exe" -NewName "Suppression_de_Filigrane_PDF-$version.exe"
        } else {
          echo "PyInstaller failed to create the executable"
          exit 1
        }

    - name: Compute SHA-256 checksum
      id: checksum
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $exePath = "dist\Suppression_de_Filigrane_PDF-$version.exe"
        $hash = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash
        echo "SHA256=$hash" >> $env:GITHUB_OUTPUT
        echo "SHA256: $hash"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Suppression_de_Filigrane_PDF-${{ steps.get_version.outputs.VERSION }}
        path: |
          dist/*.exe
        retention-days: 90
    
    - name: Create and push tag if it doesn't exist
      if: steps.check_tag.outputs.TAG_EXISTS == 'false'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag -a v${{ steps.get_version.outputs.VERSION }} -m "Version ${{ steps.get_version.outputs.VERSION }}"
        git push origin v${{ steps.get_version.outputs.VERSION }}
    
    - name: Prepare release body
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $sha256  = "${{ steps.checksum.outputs.SHA256 }}"
        if (Test-Path CHANGELOG.md) {
          $body = Get-Content CHANGELOG.md -Raw
        } else {
          $body = "# Version $version`n`n## Changes`n- Updated to version $version"
        }
        $body += "`n`n---`nSHA256: $sha256"
        Set-Content -Path release_body.md -Value $body
    
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        files: |
          dist/Suppression_de_Filigrane_PDF-${{ steps.get_version.outputs.VERSION }}.exe
        name: Version ${{ steps.get_version.outputs.VERSION }}
        body_path: release_body.md
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload build artifacts for development
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          build/
          dist/
          *.spec
        retention-days: 14